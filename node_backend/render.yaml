services:
  - type: web
    name: fairgig-auth
    runtime: node
    rootDir: node_backend
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter auth-service prisma:generate && pnpm --filter auth-service build
    preDeployCommand: pnpm --filter auth-service exec prisma migrate deploy
    startCommand: pnpm --filter auth-service start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_EXPIRY
        value: 15m
      - key: REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: COOKIE_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: RESET_TOKEN_BASE_URL
        sync: false
      - key: RESET_TOKEN_EXPIRY_HOURS
        value: 24
      - key: LOG_LEVEL
        value: info

  - type: web
    name: fairgig-earnings
    runtime: node
    rootDir: node_backend
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter earnings-service prisma:generate && pnpm --filter earnings-service build
    startCommand: pnpm --filter earnings-service start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: fairgig-screenshots
      - key: ANOMALY_SERVICE_URL
        sync: false
      - key: ANOMALY_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: LOG_LEVEL
        value: info

  - type: web
    name: fairgig-certificate
    runtime: node
    rootDir: node_backend
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter certificate-service prisma:generate && pnpm --filter certificate-service build
    startCommand: pnpm --filter certificate-service start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CERT_SHARE_BASE_URL
        sync: false
      - key: CERT_SHARE_TTL_DAYS
        value: 14
      - key: LOG_LEVEL
        value: info

  - type: web
    name: fairgig-grievance
    runtime: node
    rootDir: node_backend
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter grievance-service prisma:generate && pnpm --filter grievance-service build
    startCommand: pnpm --filter grievance-service start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LOG_LEVEL
        value: info
